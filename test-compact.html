<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>compactRouting tests</title>
  <style>
    body { font-family: monospace; padding: 12px; }
    .case { border: 1px solid #ccc; margin: 8px 0; padding: 8px; }
    .case h3 { margin: 0 0 6px 0; }
    pre { background: #f6f6f6; padding: 6px; white-space: pre-wrap; }
    .pass { color: green; }
    .fail { color: red; font-weight: bold; }
    textarea { width: 100%; height: 120px; font-family: monospace; }
  </style>
</head>
<body>
  <h2>compactRouting test cases</h2>
  <div id="cases"></div>

  <hr>
  <h2>Manual playground</h2>
  <textarea id="manual" placeholder="Paste a RoutingA config here"></textarea>
  <button id="btnRun">Compact</button>
  <pre id="out"></pre>

  <script src="compact.js"></script>
  <script>
    const cases = [
      { name: 'empty input', input: '' },
      { name: 'only comments (no blocks) — untouched', input: '# header\n# another comment\n' },
      { name: 'no markers — rules outside blocks left alone', input:
        'domain(alpha.example)->proxy\n' +
        'domain(beta.example)->proxy\n' +
        'ip(8.8.8.8)->direct\n'
      },
      { name: 'single block collapsed and markers removed', input:
        '# domain: example.com\n' +
        'domain(example.com)->proxy\n' +
        'domain(api.example.com)->proxy\n' +
        '# end domain: example.com\n'
      },
      { name: 'multiple blocks, mixed with loose rules', input:
        'domain(loose.example)->proxy\n' +
        '# domain: example.com\n' +
        'domain(example.com)->proxy\n' +
        'domain(api.example.com)->proxy\n' +
        '# end domain: example.com\n' +
        '# domain: sample.test\n' +
        'domain(sample.test)->proxy\n' +
        'domain(api.sample.test)->direct\n' +
        '# end domain: sample.test\n' +
        'ip(1.1.1.1)->direct\n'
      },
      { name: 'block already compacted (idempotent)', input:
        '# domain: example.com\n' +
        'domain(example.com, api.example.com)->proxy\n' +
        '# end domain: example.com\n'
      },
      { name: 'duplicates inside one block', input:
        '# domain: duplicate.test\n' +
        'domain(duplicate.test)->proxy\n' +
        'domain(DUPLICATE.test)->proxy\n' +
        'domain(api.duplicate.test)->proxy\n' +
        'domain(duplicate.test)->proxy\n' +
        '# end domain: duplicate.test\n'
      },
      { name: 'block with ip(...) and prefixed tokens — preserved as-is, simple ones merged', input:
        '# domain: mixed.example\n' +
        'domain(mixed.example)->proxy\n' +
        'ip(1.2.3.4)->direct\n' +
        'domain(geosite:private)->direct\n' +
        'domain(api.mixed.example)->proxy\n' +
        '# end domain: mixed.example\n'
      },
      { name: 'block without matching end marker — left alone', input:
        '# domain: orphan.example\n' +
        'domain(orphan.example)->proxy\n' +
        'domain(other.example)->proxy\n'
      },
      { name: 'comment inside block preserved before compacted line', input:
        '# domain: commented.example\n' +
        '# note: temporary\n' +
        'domain(commented.example)->proxy\n' +
        'domain(api.commented.example)->proxy\n' +
        '# end domain: commented.example\n'
      },
    ]

    function escape(s){
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }
    function render(){
      const root = document.getElementById('cases')
      for(const c of cases){
        const r = window.compactRouting(c.input)
        const div = document.createElement('div')
        div.className = 'case'
        const summary = `rules=${r.stats.originalRules} compactedLines=${r.stats.compactedLines} blocks=${r.stats.blocksProcessed} changed=${r.changed}`
        div.innerHTML = `<h3>${escape(c.name)}</h3>
          <div><b>input:</b><pre>${escape(c.input)}</pre></div>
          <div><b>output:</b><pre>${escape(r.text)}</pre></div>
          <div><b>stats:</b> ${escape(summary)} perAction=${escape(JSON.stringify(r.stats.perAction))}</div>`
        root.appendChild(div)
      }
      // idempotence
      for(const c of cases){
        const a = window.compactRouting(c.input).text
        const b = window.compactRouting(a).text
        const div = document.createElement('div')
        const ok = (a === b)
        div.className = ok ? 'pass' : 'fail'
        div.textContent = `idempotent[${c.name}]: ` + (ok ? 'PASS' : 'FAIL')
        document.getElementById('cases').appendChild(div)
      }
    }
    document.getElementById('btnRun').onclick = ()=>{
      const r = window.compactRouting(document.getElementById('manual').value)
      document.getElementById('out').textContent =
        '--- output ---\n' + r.text +
        '\n\n--- stats ---\n' + JSON.stringify(r.stats, null, 2) +
        '\nchanged=' + r.changed
    }
    render()
  </script>
</body>
</html>
